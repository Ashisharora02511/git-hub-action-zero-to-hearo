# this will deploy the safe / secure / tested app to prod server
name: Deploy To Server
on:
   workflow_call:
jobs:
   deploy:
    runs-on: ubuntu-latest
    steps:
      - name: CheckOut Code
        uses: actions/checkout@v4
      - name: SSH TO PROD Server to create folder
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
               echo "Starting deployement"
               mkdir -p devops



      - name: Copy the docker-compose file
        uses: appleboy/scp-action@v1
        with:
           host: ${{ secrets.EC2SSH_HOST }}
           username: ${{ secrets.EC2_SSH_USER }}
           key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
           source: docker-compose.yml
           target: /devops
      - name: SSH TO PROD Server to run the app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
               echo "Running App"
               sudo apt-get install docker.io docker-compose-v2 -y
               sudo usermod -aG docker $USER && newgrp docker 
               export DOCKERHUB_USER=${{ vars.DOCKERHUB_USERNAME}}
               export DOCKER_TAG={{ github.event.workflow_run.head_sha }}
               echo ${{ secrets.DOCKERHUB_TOKEN }}| docker login -u  ${{ vars.DOCKERHUB_USERNAME }}  --password-stdin 
               cd ~/devops && docker compose -d 


      
          
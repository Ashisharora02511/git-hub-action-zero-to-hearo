name: Deploy Flask App

on:
 workflow_dispatch:
   
jobs:
    deploy:
      env:
           DOCKERHUB_USER: ${{ vars.DOCKERHUB_USERNAME}}
      runs-on: self-hosted
      steps:
          - name: checkout code
            uses: actions/checkout@v4
          - name: Set up the docker compose
            uses: docker/setup-compose-action@v2
          - name: deploy with docker compose
            run: DOCKERHUB_USER=${{ vars.DOCKERHUB_USERNAME }} docker compose up -d --build